<!DOCTYPE html>
<html>
<head>
    <title>Trend Analytics Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
        input {
            padding: 10px;
            width: 250px;
        }
        .box {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>📊 Trend Analytics Dashboard</h1>

<button onclick="ingest()">Ingest News</button>
<button onclick="process()">Process Data</button>
<button onclick="getTrends()">Get Trends</button>

<br><br>

<input type="text" id="searchInput" placeholder="Search news...">
<button onclick="search()">Search</button>

<div class="box">
    <h3>Output:</h3>
    <pre id="output"></pre>
</div>

<script>
const BASE_URL = "https://web-production-835c.up.railway.app";

function show(data) {
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

async function ingest() {
    let res = await fetch(BASE_URL + "/ingest", { method: "POST" });
    let data = await res.json();
    show(data);
}

async function process() {
    let res = await fetch(BASE_URL + "/process", { method: "POST" });
    let data = await res.json();
    show(data);
}

async function getTrends() {
    let res = await fetch(BASE_URL + "/trends");
    let data = await res.json();
    show(data);
}

async function search() {
    let q = document.getElementById("searchInput").value;
    let res = await fetch(BASE_URL + "/search?q=" + q);
    let data = await res.json();
    show(data);
}
</script>

</body>
</html>
